name: Deploy web demo to GitHub Pages

# napsnap の Web デモ（Expo の static web 書き出し）を GitHub Pages へ公開する。
# 事前に GitHub リポジトリの Settings → Pages → Source を「GitHub Actions」にしておくこと。
# 注意: app.json の experiments.baseUrl は "/napsnap"。リポジトリ名が napsnap でない場合はそこを変更する。

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Export web build
        run: npx expo export --platform web
        # Supabase の鍵を載せてライブ（実データ共有）として書き出す。
        # publishable(anon) 鍵は元々クライアントに埋まる公開鍵＝公開JSから誰でも見える前提で、データは RLS で保護。
        # 鍵を替えたいときは Supabase Settings → API でローテーションし、ここを更新する。
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://zpmjykujiycmyvolewys.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ctqC7vpIr09HvJ0LpI8Bpg_bMUuZSOk
      - name: Inject OGP meta tags
        run: node scripts/inject-ogp.mjs
      - name: Disable Jekyll (keep _expo dir)
        run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
